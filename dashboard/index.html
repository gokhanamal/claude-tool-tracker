<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code — Tool Invocations</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242733;
      --border: #2e3140;
      --text: #e2e4ed;
      --text2: #8b8fa3;
      --accent: #c084fc;
      --accent2: #818cf8;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
      --cyan: #22d3ee;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); }
    .meta { color: var(--text2); font-size: 12px; }
    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--accent); }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 6px; letter-spacing: -0.03em; }
    .stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 0 32px 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .card.full { grid-column: 1 / -1; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      text-align: left; padding: 8px 12px; color: var(--text2); font-weight: 500;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface);
    }
    td {
      padding: 7px 12px; border-bottom: 1px solid var(--border);
      max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    tr:hover td { background: var(--surface2); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-pre { background: rgba(129,140,248,0.15); color: var(--accent2); }
    .badge-post { background: rgba(74,222,128,0.15); color: var(--green); }
    .badge-tool { background: rgba(192,132,252,0.12); color: var(--accent); }

    .filters {
      padding: 0 32px 16px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label { font-size: 11px; color: var(--text2); }
    select, input[type="text"] {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 5px 10px; border-radius: 6px; font-family: inherit; font-size: 12px;
    }
    select:focus, input:focus { outline: none; border-color: var(--accent); }

    .scrollable { max-height: 400px; overflow-y: auto; }
    .scrollable::-webkit-scrollbar { width: 6px; }
    .scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .chart-container { position: relative; height: 260px; }

    .session-item {
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s;
    }
    .session-item:hover { background: var(--surface2); }
    .session-id { font-size: 12px; color: var(--accent2); }
    .session-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }

    /* Detail panel */
    .detail-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .detail-overlay.open { opacity: 1; pointer-events: auto; }
    .detail-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(640px, 90vw);
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 101; transform: translateX(100%); transition: transform 0.25s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .detail-header h2 { font-size: 14px; font-weight: 600; }
    .detail-close {
      background: none; border: 1px solid var(--border); color: var(--text2);
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .detail-close:hover { color: var(--text); border-color: var(--accent); }
    .detail-body {
      flex: 1; overflow-y: auto; padding: 20px 24px;
    }
    .detail-body::-webkit-scrollbar { width: 6px; }
    .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section-title {
      font-size: 11px; color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 8px;
    }
    .detail-meta-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .detail-meta-item { }
    .detail-meta-item .dm-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
    .detail-meta-item .dm-value { font-size: 13px; margin-top: 3px; word-break: break-all; }
    .detail-json {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 16px; font-size: 12px; line-height: 1.6;
      overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    }
    .detail-json .json-key { color: var(--accent); }
    .detail-json .json-string { color: var(--green); }
    .detail-json .json-number { color: var(--amber); }
    .detail-json .json-bool { color: var(--cyan); }
    .detail-json .json-null { color: var(--text2); }
    .detail-json .json-bracket { color: var(--text2); }
    .detail-nav {
      padding: 12px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .detail-nav button {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); padding: 7px 12px; border-radius: 6px;
      cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.15s;
    }
    .detail-nav button:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
    .detail-nav button:disabled { opacity: 0.3; cursor: default; }
    tr.clickable { cursor: pointer; }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      header, .stats, .grid, .filters { padding-left: 16px; padding-right: 16px; }
      .detail-panel { width: 100vw; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1><span>claude</span> tool invocations</h1>
      <div class="meta" id="last-updated"></div>
    </div>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </header>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <div class="filter-group">
      <label>Tool</label>
      <select id="filter-tool" onchange="applyFilters()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Event</label>
      <select id="filter-event" onchange="applyFilters()">
        <option value="">All</option>
        <option value="PreToolUse">PreToolUse</option>
        <option value="PostToolUse">PostToolUse</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Session</label>
      <select id="filter-session" onchange="applyFilters()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="filter-search" placeholder="Filter input/response..." oninput="applyFilters()">
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Tool Usage</h2>
      <div class="chart-container"><canvas id="chart-tools"></canvas></div>
    </div>
    <div class="card">
      <h2>Activity Timeline</h2>
      <div class="chart-container"><canvas id="chart-timeline"></canvas></div>
    </div>
    <div class="card">
      <h2>Sessions</h2>
      <div class="scrollable" id="session-list"></div>
    </div>
    <div class="card">
      <h2>Event Split</h2>
      <div class="chart-container"><canvas id="chart-events"></canvas></div>
    </div>
    <div class="card full">
      <h2>Recent Invocations</h2>
      <div class="scrollable table-wrap" id="table-container"></div>
    </div>
  </div>

  <div class="detail-overlay" id="detail-overlay"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <h2 id="detail-title">Invocation Detail</h2>
      <button class="detail-close" id="detail-close">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="detail-nav">
      <button id="detail-prev">Prev</button>
      <button id="detail-next">Next</button>
    </div>
  </div>

  <script>
    let allData = [];
    let filteredData = [];
    let toolChart, timelineChart, eventChart;
    let detailIndex = -1;

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function loadData() {
      try {
        const resp = await fetch('/api/invocations');
        const text = await resp.text();
        allData = text.trim().split('\n')
          .filter(Boolean)
          .map(line => { try { return JSON.parse(line); } catch { return null; } })
          .filter(Boolean)
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        document.getElementById('last-updated').textContent =
          allData.length + ' invocations \u00b7 refreshed ' + new Date().toLocaleTimeString();

        populateFilters();
        applyFilters();
      } catch (e) {
        const el = document.getElementById('stats');
        el.textContent = '';
        const msg = document.createElement('div');
        msg.style.cssText = 'text-align:center;padding:48px 20px;color:var(--text2)';
        msg.textContent = 'Could not load data. Is the server running? ' + e.message;
        el.appendChild(msg);
      }
    }

    function populateFilters() {
      const tools = [...new Set(allData.map(d => d.tool_name))].sort();
      const sessions = [...new Set(allData.map(d => d.session_id))];

      const toolSelect = document.getElementById('filter-tool');
      toolSelect.textContent = '';
      const allOpt = document.createElement('option');
      allOpt.value = ''; allOpt.textContent = 'All';
      toolSelect.appendChild(allOpt);
      tools.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        toolSelect.appendChild(opt);
      });

      const sessionSelect = document.getElementById('filter-session');
      sessionSelect.textContent = '';
      const allSessOpt = document.createElement('option');
      allSessOpt.value = ''; allSessOpt.textContent = 'All';
      sessionSelect.appendChild(allSessOpt);
      sessions.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s.slice(0, 8) + '...';
        sessionSelect.appendChild(opt);
      });
    }

    function applyFilters() {
      const tool = document.getElementById('filter-tool').value;
      const event = document.getElementById('filter-event').value;
      const session = document.getElementById('filter-session').value;
      const search = document.getElementById('filter-search').value.toLowerCase();

      filteredData = allData.filter(d => {
        if (tool && d.tool_name !== tool) return false;
        if (event && d.event !== event) return false;
        if (session && d.session_id !== session) return false;
        if (search) {
          const haystack = JSON.stringify(d.tool_input || {}).toLowerCase() +
            JSON.stringify(d.tool_response || {}).toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });

      renderStats();
      renderTable();
      renderCharts();
      renderSessions();
    }

    function renderStats() {
      const el = document.getElementById('stats');
      el.textContent = '';

      const tools = new Set(filteredData.map(d => d.tool_name));
      const sessions = new Set(filteredData.map(d => d.session_id));
      const preCount = filteredData.filter(d => d.event === 'PreToolUse').length;
      const postCount = filteredData.filter(d => d.event === 'PostToolUse').length;
      const oldest = filteredData.length ? filteredData[filteredData.length - 1].timestamp : null;
      const newest = filteredData.length ? filteredData[0].timestamp : null;
      const span = oldest && newest ? formatDuration(new Date(newest) - new Date(oldest)) : '\u2014';

      const cards = [
        { label: 'Total Invocations', value: filteredData.length, sub: preCount + ' pre \u00b7 ' + postCount + ' post' },
        { label: 'Unique Tools', value: tools.size, sub: [...tools].slice(0, 3).join(', ') + (tools.size > 3 ? '...' : '') },
        { label: 'Sessions', value: sessions.size, sub: '' },
        { label: 'Time Span', value: span, sub: oldest ? new Date(oldest).toLocaleDateString() : '', smallValue: true }
      ];

      cards.forEach(c => {
        const card = document.createElement('div');
        card.className = 'stat-card';

        const lbl = document.createElement('div');
        lbl.className = 'label'; lbl.textContent = c.label;
        card.appendChild(lbl);

        const val = document.createElement('div');
        val.className = 'value';
        if (c.smallValue) val.style.fontSize = '20px';
        val.textContent = c.value;
        card.appendChild(val);

        if (c.sub) {
          const sub = document.createElement('div');
          sub.className = 'sub'; sub.textContent = c.sub;
          card.appendChild(sub);
        }
        el.appendChild(card);
      });
    }

    function summarizeInput(d) {
      const inp = d.tool_input || {};
      if (inp.command) return inp.command.slice(0, 80);
      if (inp.file_path) return inp.file_path.replace(/^\/Users\/[^/]+\//, '~/');
      if (inp.pattern) return '/' + inp.pattern + '/' + (inp.path ? ' in ' + inp.path : '');
      if (inp.query) return inp.query.slice(0, 80);
      return JSON.stringify(inp).slice(0, 80);
    }

    function renderTable() {
      const container = document.getElementById('table-container');
      container.textContent = '';

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Time', 'Event', 'Tool', 'Input Summary', 'Session'].forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      filteredData.slice(0, 200).forEach((d, i) => {
        const tr = document.createElement('tr');
        tr.className = 'clickable';
        tr.addEventListener('click', () => openDetail(i));

        const tdTime = document.createElement('td');
        tdTime.textContent = new Date(d.timestamp).toLocaleString();
        tr.appendChild(tdTime);

        const tdEvent = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = 'badge ' + (d.event === 'PreToolUse' ? 'badge-pre' : 'badge-post');
        badge.textContent = d.event;
        tdEvent.appendChild(badge);
        tr.appendChild(tdEvent);

        const tdTool = document.createElement('td');
        const toolBadge = document.createElement('span');
        toolBadge.className = 'badge badge-tool';
        toolBadge.textContent = d.tool_name;
        tdTool.appendChild(toolBadge);
        tr.appendChild(tdTool);

        const tdInput = document.createElement('td');
        tdInput.textContent = summarizeInput(d);
        tdInput.title = JSON.stringify(d.tool_input || {});
        tr.appendChild(tdInput);

        const tdSession = document.createElement('td');
        tdSession.style.color = 'var(--text2)';
        tdSession.textContent = (d.session_id || '').slice(0, 8);
        tr.appendChild(tdSession);

        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      container.appendChild(table);
    }

    function renderCharts() {
      const toolCounts = {};
      filteredData.forEach(d => { toolCounts[d.tool_name] = (toolCounts[d.tool_name] || 0) + 1; });
      const sortedTools = Object.entries(toolCounts).sort((a, b) => b[1] - a[1]);
      const colors = ['#c084fc', '#818cf8', '#22d3ee', '#4ade80', '#fbbf24', '#f87171', '#fb923c', '#a78bfa'];

      if (toolChart) toolChart.destroy();
      toolChart = new Chart(document.getElementById('chart-tools'), {
        type: 'bar',
        data: {
          labels: sortedTools.map(t => t[0]),
          datasets: [{ data: sortedTools.map(t => t[1]), backgroundColor: sortedTools.map((_, i) => colors[i % colors.length]), borderRadius: 4, borderSkipped: false }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#2e3140' }, ticks: { color: '#8b8fa3', font: { family: 'SF Mono, monospace', size: 10 } } },
            y: { grid: { display: false }, ticks: { color: '#e2e4ed', font: { family: 'SF Mono, monospace', size: 11 } } }
          }
        }
      });

      const timeGroups = {};
      filteredData.forEach(d => {
        const hour = d.timestamp.slice(0, 13) + ':00';
        timeGroups[hour] = (timeGroups[hour] || 0) + 1;
      });
      const timeLabels = Object.keys(timeGroups).sort();

      if (timelineChart) timelineChart.destroy();
      timelineChart = new Chart(document.getElementById('chart-timeline'), {
        type: 'line',
        data: {
          labels: timeLabels.map(t => new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })),
          datasets: [{ data: timeLabels.map(t => timeGroups[t]), borderColor: '#c084fc', backgroundColor: 'rgba(192,132,252,0.1)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#c084fc' }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#2e3140' }, ticks: { color: '#8b8fa3', maxRotation: 45, font: { size: 10 } } },
            y: { grid: { color: '#2e3140' }, ticks: { color: '#8b8fa3', font: { size: 10 } }, beginAtZero: true }
          }
        }
      });

      const preCt = filteredData.filter(d => d.event === 'PreToolUse').length;
      const postCt = filteredData.filter(d => d.event === 'PostToolUse').length;

      if (eventChart) eventChart.destroy();
      eventChart = new Chart(document.getElementById('chart-events'), {
        type: 'doughnut',
        data: {
          labels: ['PreToolUse', 'PostToolUse'],
          datasets: [{ data: [preCt, postCt], backgroundColor: ['#818cf8', '#4ade80'], borderWidth: 0, spacing: 2 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '65%',
          plugins: { legend: { position: 'bottom', labels: { color: '#8b8fa3', font: { family: 'SF Mono, monospace', size: 11 }, padding: 16 } } }
        }
      });
    }

    function renderSessions() {
      const el = document.getElementById('session-list');
      el.textContent = '';

      const sessionMap = {};
      filteredData.forEach(d => {
        if (!sessionMap[d.session_id]) sessionMap[d.session_id] = { count: 0, tools: new Set(), first: d.timestamp, last: d.timestamp };
        const s = sessionMap[d.session_id];
        s.count++;
        s.tools.add(d.tool_name);
        if (d.timestamp < s.first) s.first = d.timestamp;
        if (d.timestamp > s.last) s.last = d.timestamp;
      });

      Object.entries(sessionMap)
        .sort((a, b) => new Date(b[1].last) - new Date(a[1].last))
        .forEach(([id, s]) => {
          const item = document.createElement('div');
          item.className = 'session-item';
          item.addEventListener('click', () => {
            document.getElementById('filter-session').value = id;
            applyFilters();
          });

          const idEl = document.createElement('div');
          idEl.className = 'session-id';
          idEl.textContent = id.slice(0, 12) + '...';
          item.appendChild(idEl);

          const meta = document.createElement('div');
          meta.className = 'session-meta';
          meta.textContent = s.count + ' invocations \u00b7 ' + s.tools.size + ' tools \u00b7 ' + new Date(s.last).toLocaleString();
          item.appendChild(meta);

          el.appendChild(item);
        });
    }

    function formatDuration(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ' + (m % 60) + 'm';
      const d = Math.floor(h / 24);
      return d + 'd ' + (h % 24) + 'h';
    }

    loadData();
    setInterval(loadData, 10000);
  </script>
</body>
</html>
